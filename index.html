<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Chartlinx</title>

<style>

body{
margin:0;
font-family:Arial;
}

nav{
background:#f2f2f2;
padding:15px;
display:flex;
justify-content:flex-end;
gap:25px;
}

nav a{
cursor:pointer;
text-decoration:none;
color:#333;
font-weight:500;
}

.dropdown{
position:relative;
display:inline-block;
}

.dropdown-content{
display:none;
position:absolute;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
min-width:180px;
top:100%;
left:0;
}

.dropdown:hover .dropdown-content{
display:block;
}

.dropdown-content a{
display:block;
padding:8px 16px;
text-decoration:none;
color:#333;
white-space:nowrap;
cursor:pointer;
}

.dropdown-content a:hover{
background:#f2f2f2;
}

.viewer{
width:100%;
height:92vh;
}

object{
width:100%;
height:100%;
}

</style>

</head>

<body>

<nav>

<a onclick="loadPage('Home.svg')">Home</a>

<a onclick="loadPage('AboutUs.svg')">About Us</a>

<div class="dropdown">

<a onclick="loadPage('OurServices.svg')">Our Services ▾</a>

<div class="dropdown-content">

<a onclick="loadPage('ShipBroking.svg')">Ship Broking</a>

<a onclick="loadPage('OpsSupport.svg')">Ops Support</a>

<a onclick="loadPage('HeavyLift.svg')">Heavy Lift</a>

<a onclick="loadPage('9.svg')">Service 4</a>

</div>

</div>

</div>

<a onclick="loadPage('Network.svg')">Network</a>

<a onclick="loadPage('Partner.svg')">Partner</a>

<a onclick="loadPage('Contact9.svg')">Contact Us</a>

</nav>

<div class="viewer">

<object id="viewer" data="svg/Home.svg" type="image/svg+xml"></object>

</div>

<script>

<script>

<script>

function loadPage(page){
document.getElementById("viewer").data = "svg/" + page;
}

</script>

</script>

</script>

</body>

</html>
