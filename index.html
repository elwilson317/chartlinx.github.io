<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Chartlinx</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
}

nav{
background:#f2f2f2;
padding:15px;
text-align:right;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#333;
font-weight:500;
}

.viewer{
width:100vw;
height:calc(100vh - 60px);
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<nav>
<a href="svg/Home.svg" target="content">Home</a>
<a href="svg/About Us.svg" target="content">About Us</a>
<a href="svg/Our Services.svg" target="content">Our Services</a>
<a href="svg/Network.svg" target="content">Network</a>
<a href="svg/Partner.svg" target="content">Partner</a>
<a href="svg/Contact Us.svg" target="content">Contact Us</a>
</nav>

<div class="viewer">
<iframe src="svg/Home.svg" name="content"></iframe>
</div>

</body>
</html>
