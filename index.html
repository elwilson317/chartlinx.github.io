<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Chartlinx</title>

<style>

body{
margin:0;
font-family:Arial;
}

nav{
background:#f2f2f2;
padding:15px;
text-align:right;
}

nav a{
margin-left:25px;
cursor:pointer;
text-decoration:none;
color:#333;
}

.viewer{
width:100%;
height:92vh;
}

object{
width:100%;
height:100%;
}

</style>

</head>

<body>

<nav>
<a onclick="loadPage('Home.svg')">Home</a>
<a onclick="loadPage('AboutUs.svg')">About Us</a>
<a onclick="loadPage('OurServices.svg')">Our Services</a>
<a onclick="loadPage('Network.svg')">Network</a>
<a onclick="loadPage('Partner.svg')">Partner</a>
<a onclick="loadPage('ContactUs.svg')">Contact Us</a>
</nav>

<div class="viewer">

<object id="viewer" data="svg/Home.svg" type="image/svg+xml"></object>

</div>

<script>

function loadPage(page){
document.getElementById("viewer").data = "svg/" + page;
}

</script>

</body>

</html>
